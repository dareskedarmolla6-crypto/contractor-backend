<!DOCTYPE html><html lang="am"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Contractor Enterprise AI</title><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

/* CHAT AREA */

#chatBox{
padding:20px;
padding-bottom:120px;
}

/* USER MESSAGE */

.msg.user{
background:#2ecc71;
color:white;
padding:10px 15px;
border-radius:20px;
max-width:70%;
margin-left:auto;
margin-top:10px;
}

/* BOT MESSAGE */

.msg.bot{
background:white;
padding:12px 15px;
border-radius:15px;
max-width:75%;
margin-top:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

/* WELCOME CARD */

.welcome-card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
border-left:6px solid #1abc9c;
max-width:320px;
font-size:15px;
}

/* INVOICE CARD */

.invoice-card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
margin-top:15px;
border-left:6px solid gold;
max-width:320px;
}

/* PDF BUTTON */

.pdf-btn{
margin-top:15px;
background:#27ae60;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:10px;
font-weight:bold;
}

/* COMMAND INPUT */

.command-box{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
padding:15px;
box-shadow:0 -3px 10px rgba(0,0,0,0.1);
display:flex;
gap:10px;
}

#userInput{
flex:1;
padding:12px;
border-radius:25px;
border:1px solid #ddd;
font-size:14px;
}

button{
background:#2ecc71;
color:white;
border:none;
padding:12px 25px;
border-radius:25px;
font-weight:bold;
}

</style></head><body><div id="chatBox"><div class="welcome-card">🤖 <b>Contractor Enterprise AI</b><br><br>

ከታች ትዕዛዝ ጻፍ እና Send ተጫን።<br><br>

🧾 ደረሰኝ ለመፍጠር<br>
📂 ታሪክ ለማየት<br>
📊 ገቢ ለማየት

</div></div><div class="command-box"><input 
type="text"
id="userInput"
placeholder="ለምሳሌ: ደረሰኝ ለአበበ 5000"
autocomplete="off">

<button onclick="handleChat()">Send</button>

</div><!-- PDF LIBRARY FIRST --><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><!-- MAIN SCRIPT --><script>

function handleChat(){

let input=document.getElementById("userInput").value
let chat=document.getElementById("chatBox")

if(input=="") return

chat.innerHTML+=`<div class="msg user">${input}</div>`

if(input.includes("ደረሰኝ")){

let parts=input.split(" ")
let client=parts[1]
let amount=parts[2]

let invoiceId="INV-"+Math.floor(Math.random()*100000)

chat.innerHTML+=`

<div class="invoice-card">

<b>Invoice</b><br><br>

Client: ${client}<br>
Amount: ${amount} ETB<br>
Invoice ID: ${invoiceId}

<button class="pdf-btn" onclick="downloadPDF('${invoiceId}','${client}','${amount}')">

Download PDF

</button>

</div>
`

}

document.getElementById("userInput").value=""

}

function downloadPDF(id,client,amount){

const { jsPDF } = window.jspdf

const doc=new jsPDF()

doc.text("Contractor Enterprise Invoice",20,20)

doc.text("Invoice ID: "+id,20,40)

doc.text("Client: "+client,20,50)

doc.text("Amount: "+amount+" ETB",20,60)

doc.save(id+".pdf")

}

</script></body>
</html>
